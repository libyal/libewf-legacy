[project]
name: "libewf"
status: "stable"
authors: ["Joachim Metz <joachim.metz@gmail.com>"]
year_of_creation: "2006"
data_format: "Expert Witness Compression Format (EWF)"
documentation_url: "https://github.com/libyal/libewf/tree/main/documentation"
download_url: "https://github.com/libyal/libewf-legacy/releases"
git_url: "https://github.com/libyal/libewf-legacy.git"
features: ["debug_output", "ossfuzz", "python_bindings", "tools"]

[library]
build_dependencies: ["crypto", "zlib"]
public_types: ["file_entry", "handle"]
tests: ["bit_stream", "checksum", "chunk_data", "chunk_table", "compression", "date_time", "date_time_values", "deflate", "empty_block", "error", "file_entry", "filename", "hash_sections", "hash_values", "huffman_tree", "io_handle", "media_values", "notify", "read_io_handle", "sector_range", "segment_table", "single_files", "write_io_handle"]
tests_with_input: ["handle", "read", "seek", "support"]

[python_module]
year_of_creation: "2008"
tests_with_input: ["support"]

[tools]
build_dependencies: ["crypto", "fuse", "lex", "uuid", "yacc"]
description: "Several tools for reading and writing EWF files"
names: ["ewfacquire", "ewfacquirestream", "ewfexport", "ewfinfo", "ewfmount", "ewfverify"]

[mount_tool]
features: ["glob", "multi_source"]
file_entry_type: "handle"
file_entry_type_size_value: "media_size"
missing_backend_error: "No sub system to mount EWF."
mount_point: "/mnt/ewfimage/"
mounted_description: "a device file that provides the RAW storage media data contained in the EWF image"
mounted_dokan: "X:\\EWF1"
mounted_fuse: "/mnt/ewfimage/ewf1"
source: "image.E01"
source_description: "an EWF image"
source_type: "image"
supported_backends: [
    "Dokan library",
    "fuse",
    "OSXFuse"]

[troubleshooting]
example: "ewfinfo image.E01"

[development]
features: ["glob", "pytsk3"]
main_object: "handle"
main_object_filename: "image.E01"
main_object_size: "media_size"

[test_data]
repository: "log2timeline/dfvfs"
files: ["ext2.E01"]

[tests]
profiles: ["libewf_legacy", "pyewf_legacy", "ewfacquire", "ewfacquire_optical", "ewfacquirestream", "ewfexport_legacy", "ewfexport_logical_legacy", "ewfexport_write", "ewfinfo_legacy", "ewfverify_legacy", "ewfverify_logical_legacy"]
glob_per_profile: ["*.[ELels]01", "*.[ELels]01", "*.[Rr][Aa][Ww]", "*.[Cc][Uu][Ee]", "*.[Rr][Aa][Ww]", "*.[Ees]01", "*.[Ll]01", "*.[Ees]01", "*.[ELels]01", "*.[Ll]01", "*.[Ees]01", "*.[Ll]01"]
options_per_profile: ["", "", "", "", "", "-fraw", "-ffiles", "", "", "-H", "-dmd5", "-dmd5 -ffiles"]
example_filename1: "image1.E01"
example_filename2: "image2.s01"

